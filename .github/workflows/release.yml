name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uping-linux
          path: uping
          retention-days: 1

  build-macos:
    name: Build (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uping-macos
          path: uping
          retention-days: 1

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    permissions:
      contents: write

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: uping-linux
          path: dist/linux

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: uping-macos
          path: dist/macos

      - name: Rename binaries
        run: |
          mv dist/linux/uping dist/uping-linux
          mv dist/macos/uping dist/uping-macos
          chmod +x dist/uping-linux dist/uping-macos

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          release_status_code="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest"
          )"
          curl_exit_code=$?
          set -e

          if [ "$curl_exit_code" -ne 0 ]; then
            echo "Failed to check release 'latest' existence via GitHub API (curl exit code: $curl_exit_code)." >&2
            exit "$curl_exit_code"
          fi

          if [ "$release_status_code" = "200" ]; then
            gh release delete latest --cleanup-tag --yes --repo ${{ github.repository }}
          elif [ "$release_status_code" = "404" ]; then
            echo "Release 'latest' does not exist; skipping deletion."
          else
            echo "Failed to check release 'latest' existence (HTTP $release_status_code)." >&2
            exit 1
          fi

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}." \
            --prerelease \
            dist/uping-linux \
            dist/uping-macos
