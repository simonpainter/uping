name: Release

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uping-linux
          path: uping

  build-macos:
    name: Build (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uping-macos
          path: uping

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    permissions:
      contents: write

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: uping-linux
          path: dist/linux

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: uping-macos
          path: dist/macos

      - name: Rename binaries
        run: |
          mv dist/linux/uping dist/uping-linux
          mv dist/macos/uping dist/uping-macos
          chmod +x dist/uping-linux dist/uping-macos

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          release_view_output="$(gh release view latest --repo ${{ github.repository }} 2>&1)"
          release_view_status=$?
          set -e

          if [ "$release_view_status" -eq 0 ]; then
            gh release delete latest --cleanup-tag --yes --repo ${{ github.repository }}
          elif echo "$release_view_output" | grep -Eiq '(^gh: release not found$|^release not found$|^gh: Not Found \(HTTP 404\)$)'; then
            echo "Release 'latest' does not exist; skipping deletion."
          else
            echo "$release_view_output" >&2
            exit "$release_view_status"
          fi

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}." \
            --prerelease \
            dist/uping-linux \
            dist/uping-macos
